name: Sync EasyProxy Daily

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git remote add upstream https://github.com/realbestia1/EasyProxy.git
          git fetch upstream
          git checkout main || git checkout master
          git merge upstream/main || git merge upstream/master --allow-unrelated-histories
          git push origin HEAD
